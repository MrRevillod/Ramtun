services:
  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
      target: prod
    container_name: ramtun-server
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ramtun-network

  client:
    build:
      context: .
      dockerfile: ./apps/client/Dockerfile
      target: prod
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_started
    networks:
      - ramtun-network

  postgres:
    image: postgres:16-alpine
    container_name: ramtun-postgres
    command: postgres -c log_min_messages=ERROR -c log_statement=none -c log_duration=off -c log_min_duration_statement=-1 -c log_checkpoints=off
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - ramtun-network
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  ramtun-network:
    driver: bridge

volumes:
  postgres_data:
