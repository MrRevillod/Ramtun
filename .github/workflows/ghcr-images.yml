name: GHCR Images

on:
  push:
    branches: [ main ]
    paths:
      - "apps/server/**"
      - "apps/client/**"
      - "apps/server/Dockerfile"
      - "apps/client/Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "config/nginx.prod.conf"
      - ".dockerignore"
      - ".github/workflows/ghcr-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-images-${{ github.sha }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server_changed: ${{ steps.changes.outputs.server }}
      client_changed: ${{ steps.changes.outputs.client }}

    steps:
      - name: Checkout
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v4

      - name: Detect changed paths
        if: ${{ github.event_name == 'push' }}
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.dockerignore'
              - '.github/workflows/ghcr-images.yml'
            client:
              - 'apps/client/**'
              - 'config/nginx.prod.conf'
              - '.dockerignore'
              - '.github/workflows/ghcr-images.yml'

      - name: Resolve build targets
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "server=true" >> "$GITHUB_OUTPUT"
            echo "client=true" >> "$GITHUB_OUTPUT"
          else
            echo "server=${{ steps.filter.outputs.server }}" >> "$GITHUB_OUTPUT"
            echo "client=${{ steps.filter.outputs.client }}" >> "$GITHUB_OUTPUT"
          fi

  build-server:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.server_changed == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/ramtun-server
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/server/Dockerfile
          target: prod
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-client:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.client_changed == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/ramtun-client
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/client/Dockerfile
          target: prod
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
